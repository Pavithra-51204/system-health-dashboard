version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: healthdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./app/backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./app/backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=healthdb
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./app/frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: